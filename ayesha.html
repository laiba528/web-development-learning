<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <title>ShopEase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #4f46e5;
        }
        .nav-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #666;
            font-weight: bold;
        }
        .nav-icons i {
            margin: 0 12px;
            font-size: 22px;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(30, 58, 138, 0.7);
        }
        .hero-content {
            position: relative;
            z-index: 2;
        }
        .hero h1 {
            font-size: 52px;
            margin-bottom: 12px;
        }
        .hero p {
            font-size: 22px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
        }
        .btn-primary {
            background: white;
            color: #1e3a8a;
        }

        /* Why Choose Us */
        .why-choose {
            padding: 60px 20px;
            text-align: center;
        }
        .main-title {
            font-size: 36px;
            font-weight: 800;
            color: #4f46e5;
            margin-bottom: 8px;
        }
        .grid-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .grid-col {
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
        }
        .grid-col:hover {
            transform: scale(1.08);
            background-color: #4f46e5;
            color: white;
        }
        .card-img-top {
            height: 80px;
            width: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
        }

        /* Other Sections (Keeping your original beautiful styles) */
        .section-container, .category-section, .newsletter-section {
            max-width: 1280px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        .section-title, .main-title {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: #4f46e5;
            margin-bottom: 8px;
        }

        .section-subtitle, .sub-title {
            text-align: center;
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 48px;
        }

        /* Products Grid */
        .products-grid {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 260px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-10px);
        }

        /* Rest of your styles (kept as good as possible) */
        .category-card {
            position: relative;
            height: 320px;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
        }
        .category-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }
        .category-card:hover img {
            transform: scale(1.08);
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.1));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 32px;
            color: white;
        }

        .sale-banner {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        /* Footer */
        .footer-section {
            background-color: #0b1528;
            color: #9ca3af;
            padding: 80px 24px 30px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">ShopEase</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
        <div class="nav-icons">
            <i class="ri-user-3-line"></i>
            <i class="ri-shopping-cart-line"></i>
            <i class="ri-search-line"></i>
        </div>
    </div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Welcome to ShopEase</h1>
            <p>Discover Amazing Products at Unbeatable Prices</p>
            <div>
                <button class="btn btn-primary">Shop Now</button>
                <button class="btn btn-primary">Explore More</button>
            </div>
        </div>
    </section>

    

</body>
</html>
